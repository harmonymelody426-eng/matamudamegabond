<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panduan & Timer MATAMUDA - Senin (Desktop Premium)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: url('https://lh3.googleusercontent.com/d/1DWgcohqNfViclL0SIQIIo2QmTyBhKyEX') no-repeat center center fixed;
            background-size: cover;
            color: #2c3e50;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- CONTAINER UTAMA --- */
        .container {
            width: 92%;
            max-width: 1200px;
            background: linear-gradient(135deg, #fffdf0 0%, #fff9d6 100%); 
            padding: 40px;
            border-radius: 45px;
            border: 8px solid #1b5e20;
            box-shadow: 0 18px 0px #0a330e, 0 30px 50px rgba(0, 0, 0, 0.35);
            position: relative;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { 
            font-family: 'Fredoka', sans-serif;
            color: #1b5e20; margin: 0; font-size: 38px;
            text-shadow: 3px 3px 0px #ffd700, 6px 6px 0px #0a330e;
        }
        h2 { 
            font-family: 'Fredoka', sans-serif; font-size: 14px; color: #ff6f00; 
            text-transform: uppercase; letter-spacing: 2px; margin: 0;
        }

        .desktop-grid {
            display: flex; gap: 40px; align-items: center; justify-content: center; min-height: 410px;
        }

        /* --- BINGKAI FOTO PEMATERI --- */
        .speakers-column {
            flex: 1.2; display: flex; justify-content: center; align-items: flex-end; gap: 20px;
            height: 390px; background: linear-gradient(135deg, #a4db9b 0%, #1b5e20 100%);
            border-radius: 32px; padding: 20px; border: 6px solid #0a330e;
            box-shadow: inset 0 10px 0px rgba(0,0,0,0.15);
        }
        .speaker-photo {
            width: 180px; height: 280px; object-fit: contain; 
            filter: drop-shadow(5px 5px 0px #0a330e);
        }
        .speaker-name {
            font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 700;
            color: #1b5e20; background: #ffd700; padding: 8px 16px;
            border-radius: 18px; border: 3px solid #0a330e; box-shadow: 0 5px 0px #c5a000;
            text-align: center;
        }

        /* --- KARTU INFORMASI --- */
        .info-column {
            flex: 1; display: flex; flex-direction: column; justify-content: space-between;
            background: #ffffff; padding: 25px; border-radius: 32px;
            border: 5px solid #0a330e; height: 410px;
        }
        .activity-card { overflow-y: auto; flex: 1; margin-bottom: 10px; padding-right: 5px; }
        .activity-card::-webkit-scrollbar { width: 6px; }
        .activity-card::-webkit-scrollbar-thumb { background-color: #1b5e20; border-radius: 10px; }
        
        .activity-title { font-family: 'Fredoka', sans-serif; font-size: 22px; color: #1b5e20; margin-bottom: 5px; }
        .activity-time { 
            font-family: 'Fredoka', sans-serif; font-size: 12px; color: #fff;
            background: #ff6f00; padding: 4px 12px; border-radius: 15px; border: 2px solid #0a330e;
            display: inline-block; margin-bottom: 10px;
        }
        .activity-detail { font-size: 14px; color: #37474f; font-weight: 600; margin: 10px 0; }

        /* --- AREA TOMBOL VIDEO (KHUSUS SLIDE 2) --- */
        .video-controls-area { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-video-choice {
            background: #2196f3; color: white; border: 3px solid #0a330e;
            padding: 12px; border-radius: 15px; font-family: 'Fredoka', sans-serif;
            font-weight: 700; cursor: pointer; box-shadow: 0 4px 0px #0d47a1;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: background 0.2s;
        }
        .btn-video-choice:hover { background: #1976d2; }
        .btn-video-choice:active { transform: translateY(4px); box-shadow: 0 0px 0px #0d47a1; }
        .inline-player { width: 100%; height: 160px; border-radius: 15px; border: 3px solid #0a330e; display: none; background: #000; margin-top: 5px; }

        /* --- PANEL TIMER & MUSIK --- */
        .timer-section {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 10px; border-top: 3px dashed #ffd700; margin-top: 5px;
        }
        .timer-display {
            font-size: 42px; font-weight: 700; color: #ffffff; font-family: 'Fredoka', monospace;
            background: #d32f2f; padding: 5px 20px; border-radius: 15px; border: 3px solid #7f100f;
        }
        .music-box { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .music-status-label { font-size: 11px; font-weight: 800; color: #0288d1; text-transform: uppercase; }
        .btn-music-toggle {
            background: #0288d1; color: white; border: 2px solid #0a330e;
            padding: 6px 12px; border-radius: 10px; font-family: 'Fredoka', sans-serif;
            font-size: 11px; cursor: pointer; box-shadow: 0 3px 0px #01579b;
        }
        .btn-music-toggle:active { transform: translateY(3px); box-shadow: 0 0px 0px #01579b; }

        /* --- TOMBOL NAVIGASI UTAMA --- */
        .controls { display: flex; gap: 8px; margin-top: 10px; }
        .controls button {
            flex: 1; padding: 12px; font-size: 13px; font-weight: 700; font-family: 'Fredoka', sans-serif;
            border: 3px solid #0a330e; border-radius: 15px; cursor: pointer;
        }
        .btn-start { background: #4caf50; color: white; box-shadow: 0 4px 0px #0c3a10; }
        .btn-pause { background: #ffb300; color: white; box-shadow: 0 4px 0px #b56500; }
        .btn-next { background: #29b6f6; color: white; box-shadow: 0 4px 0px #01579b; }
        .controls button:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0px 0px transparent; }
        .controls button:disabled { background: #cfd8dc !important; border-color: #b0bec5; cursor: not-allowed; box-shadow: none; color: #90a4ae !important; }

        .progress-badge {
            margin-top: 15px; text-align: center; font-family: 'Fredoka'; font-size: 12px;
            background: #1b5e20; color: #fff; padding: 5px 20px; border-radius: 20px;
        }

        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<audio id="bg-music" loop><source src="musicmateri.mp3" type="audio/mpeg"></audio>

<div class="container">
    <header>
        <h1>📌 PANDUAN AKTIVITAS MATAMUDA</h1>
        <h2>MIN 3 BONDOWOSO - HARI SENIN (HARI KE-1)</h2>
    </header>

    <div class="desktop-grid">
        <div class="speakers-column" id="speakers-container"></div>

        <div class="info-column">
            <div class="activity-card">
                <span id="act-time" class="activity-time">Waktu: --:--</span>
                <div id="act-title" class="activity-title">Memuat...</div>
                <p id="act-detail" class="activity-detail">Materi...</p>
                
                <div id="video-area" class="video-controls-area"></div>
            </div>

            <div>
                <div class="timer-section">
                    <div class="timer-display" id="timer">00:00</div>
                    <div class="music-box">
                        <span class="music-status-label">Musik: <span id="music-status">Mati</span></span>
                        <button class="btn-music-toggle" onclick="toggleMusic()">⏯️ BACKSOUND</button>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn-start" id="btn-start" onclick="startTimer()">MULAI</button>
                    <button class="btn-pause" id="btn-pause" onclick="pauseTimer()" disabled>PAUSE</button>
                    <button class="btn-next" id="btn-next" onclick="nextActivity()">LANJUT</button>
                </div>
            </div>
        </div>
    </div>

    <div style="display: flex; justify-content: center;">
        <div class="progress-badge" id="progress">Aktivitas 1 dari 6</div>
    </div>
</div>

<script>
    const idPhotos = {
        abdurrahman: "18OK2aJd-rJqoMr9TjOgZzhv5lkysJ55w",
        rofiq: "1-UnhtkKqrjxvWh7muXhG-AFJ5DqV7TjT",
        sitiLailatul: "1Lxr3PuzOkG5RghYU6X3s6l1YGNoSdh3A",
        kusumaWardani: "1CroqKQYrHsDzZOBiTI4iFdFEA5l7_EmK",
        sulaimanWahyu: "15Nk4hQwZQZ9mQOwRWcmWryqkiKMcWk9P",
        baratut: "1bz5tmvLoVopX37NGzpIPXIDLO58VrTEb",
        irmaNur: "18bqrkUSWN3kU9hrnttnEe4TcBMAZCKd0"
    };

    function getDirectLink(id) { return `https://lh3.googleusercontent.com/d/${id}`; }

    const jadwalSenin = [
        {
            judul: "Pembiasaan Pagi & Ritual", waktu: "06.30 - 07.15 WIB", durasi: 2700,
            detail: "Muroja'ah Surat Pendek dan Sholat Dhuha Berjamaah.",
            petugas: [{ nama: "Ustd. Abdurrahman", foto: getDirectLink(idPhotos.abdurrahman) }, { nama: "Ustd. Rofiq", foto: getDirectLink(idPhotos.rofiq) }]
        },
        {
            judul: "Pembukaan & Lagu Wajib", waktu: "07.15 - 08.00 WIB", durasi: 2700,
            detail: "Menyanyikan Indonesia Raya & Mars Madrasah, Sambutan Kepala Madrasah.",
            petugas: [{ nama: "Ustdz. Siti Lailatul", foto: getDirectLink(idPhotos.sitiLailatul) }, { nama: "Ustdz. Kusuma", foto: getDirectLink(idPhotos.kusumaWardani) }]
        },
        {
            judul: "Rising Stars Quiz", waktu: "08.00 - 08.30 WIB", durasi: 1800,
            detail: "Sosialisasi Aplikasi dan Regulasi Bintang Harian.",
            petugas: [{ nama: "Ustd. Sulaiman Wahyu", foto: getDirectLink(idPhotos.sulaimanWahyu) }]
        },
        {
            judul: "Snack Time", waktu: "08.30 - 09.00 WIB", durasi: 1800,
            detail: "Murid menikmati snack sehat bersama dibimbing adab makan.",
            petugas: [{ nama: "Ustdz. Baratut", foto: getDirectLink(idPhotos.baratut) }]
        },
        {
            judul: "Amazing Race", waktu: "09.00 - 09.45 WIB", durasi: 2700,
            detail: "Berkeliling area madrasah (kelas, perpus, UKS dll).",
            petugas: [{ nama: "Ustdz. Irma Nur", foto: getDirectLink(idPhotos.irmaNur) }]
        },
        {
            judul: "Ritual Penutup", waktu: "09.45 - 10.30 WIB", durasi: 2700,
            detail: "Refleksi harian 'Bintang Hari Ini' dan Berdoa.",
            petugas: [{ nama: "Ustd. Sulaiman Wahyu", foto: getDirectLink(idPhotos.sulaimanWahyu) }]
        }
    ];

    let currentIndex = 0;
    let timeLeft = 0;
    let timerInterval = null;
    let isRunning = false;
    let isMusicPlaying = false;
    const music = document.getElementById("bg-music");

    function loadActivity(index) {
        const container = document.getElementById("speakers-container");
        const videoArea = document.getElementById("video-area");
        
        container.innerHTML = "";
        videoArea.innerHTML = ""; // Kosongkan area tombol video di awal slide

        if (index >= jadwalSenin.length) {
            document.getElementById("act-title").innerText = "🎉 Acara Selesai!";
            document.getElementById("act-time").style.display = "none";
            document.getElementById("act-detail").innerText = "Seluruh materi hari pertama selesai.";
            return;
        }

        const data = jadwalSenin[index];
        document.getElementById("act-title").innerText = data.judul;
        document.getElementById("act-time").innerText = "⏰ " + data.waktu;
        document.getElementById("act-detail").innerText = data.detail;
        document.getElementById("progress").innerText = `Aktivitas ${index + 1} dari ${jadwalSenin.length}`;
        
        data.petugas.forEach(p => {
            const wrapper = document.createElement("div");
            wrapper.style.display = "flex";
            wrapper.style.flexDirection = "column";
            wrapper.style.alignItems = "center";
            wrapper.innerHTML = `<img class="speaker-photo" src="${p.foto}"><div class="speaker-name">${p.nama}</div>`;
            container.appendChild(wrapper);
        });

        // MASUKKAN TOMBOL SECARA AMAN JIKA DI SLIDE 2 (INDEX 1)
        if (index === 1) {
            videoArea.innerHTML = `
                <button class="btn-video-choice" id="btn-indo" onclick="playLocalVideo('Indonesia')">🇮🇩 PUTAR INDONESIA RAYA</button>
                <video id="playerIndonesia" class="inline-player" controls src="indonesia_raya.mp4"></video>
                
                <button class="btn-video-choice" id="btn-mars" onclick="playLocalVideo('Mars')">🕌 PUTAR MARS MADRASAH</button>
                <video id="playerMars" class="inline-player" controls src="mars_madrasah.mp4"></video>
            `;
        }

        timeLeft = data.durasi;
        updateTimerDisplay();
    }

    function playLocalVideo(tipe) {
        // Otomatis pause backsound musik agar tidak bentrok suara
        music.pause();
        isMusicPlaying = false;
        document.getElementById("music-status").innerText = "Mati";

        if(tipe === 'Indonesia') {
            document.getElementById('btn-indo').style.display = 'none';
            const vIndo = document.getElementById('playerIndonesia');
            vIndo.style.display = 'block'; 
            vIndo.play();
        } else {
            document.getElementById('btn-mars').style.display = 'none';
            const vMars = document.getElementById('playerMars');
            vMars.style.display = 'block'; 
            vMars.play();
        }
    }

    function toggleMusic() {
        if (isMusicPlaying) {
            music.pause();
            isMusicPlaying = false;
            document.getElementById("music-status").innerText = "Mati";
        } else {
            music.play().catch(e => console.log("Menunggu interaksi user"));
            isMusicPlaying = true;
            document.getElementById("music-status").innerText = "Aktif 🎵";
        }
    }

    function updateTimerDisplay() {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById("timer").innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
    }

    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        document.getElementById("btn-start").disabled = true;
        document.getElementById("btn-pause").disabled = false;
        
        // Auto play backsound di awal jika bukan di slide 2
        if (!isMusicPlaying && currentIndex !== 1) {
            music.play().catch(e => console.log("Izin audio aktif"));
            isMusicPlaying = true; 
            document.getElementById("music-status").innerText = "Aktif 🎵";
        }

        timerInterval = setInterval(() => {
            if (timeLeft > 0) { 
                timeLeft--; 
                updateTimerDisplay(); 
            } else { 
                clearInterval(timerInterval); 
                isRunning = false; 
                alert("Sesi Selesai!"); 
            }
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        document.getElementById("btn-start").disabled = false;
        document.getElementById("btn-pause").disabled = true;
    }

    function nextActivity() {
        clearInterval(timerInterval);
        isRunning = false;
        currentIndex++;
        loadActivity(currentIndex);
    }

    // Inisialisasi awal aplikasi
    loadActivity(currentIndex);
</script>
</body>
</html>
