<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panduan & Timer MATAMUDA - Senin (Desktop Premium)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* UTUH: Tetap Menggunakan Backdrop Utama Milikmu */
            background: url('https://lh3.googleusercontent.com/d/1DWgcohqNfViclL0SIQIIo2QmTyBhKyEX') no-repeat center center fixed;
            background-size: cover;
            color: #2c3e50;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- CONTAINER TENGAH: GAYA KARTUN 3D/4D PREMIUM --- */
        .container {
            width: 90%;
            max-width: 1180px;
            /* Putih glossy transparan premium agar menyatu dengan latar */
            background: rgba(255, 255, 255, 0.94); 
            padding: 35px;
            border-radius: 40px;
            /* Efek bayangan gembung 3D ke bawah */
            box-shadow: 
                0 20px 0px rgba(27, 94, 32, 0.3), 
                0 30px 60px rgba(0, 0, 0, 0.2);
            /* Border tebal melengkung khas UI Game / Kartun */
            border: 6px solid #2e7d32;
            outline: 6px solid #ffd700;
            position: relative;
            backdrop-filter: blur(12px);
            animation: containerPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }
        h1 { 
            font-family: 'Fredoka', sans-serif;
            color: #1b5e20; 
            margin: 0 0 4px 0; 
            font-size: 36px;
            font-weight: 700;
            /* Teks Timbul Gaya Animasi 4D */
            text-shadow: 3px 3px 0px #ffd700, 5px 5px 0px rgba(0,0,0,0.15);
        }
        h2 { 
            font-family: 'Fredoka', sans-serif;
            font-size: 13px; 
            color: #4caf50; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .desktop-grid {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            min-height: 410px;
        }

        /* --- BINGKAI FOTO PEMATERI KARTUN 3D --- */
        .speakers-column {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            height: 380px;
            position: relative;
            /* Background gradasi hijau ceria berlapis bantal dalam */
            background: linear-gradient(135deg, #a4db9b 0%, #1b5e20 100%);
            border-radius: 28px;
            padding: 20px;
            border: 5px solid #0c2310;
            box-shadow: inset 0 8px 0px rgba(0,0,0,0.15), 0 10px 0px rgba(0,0,0,0.1);
        }

        .speaker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: floatCartoon 4s ease-in-out infinite;
        }

        .speaker-photo {
            width: 180px;
            height: 270px;
            object-fit: contain; 
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            filter: drop-shadow(4px 8px 0px rgba(12,35,16,0.3));
        }

        .speaker-name {
            margin-top: -5px;
            font-family: 'Fredoka', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #1b5e20;
            background: #ffd700;
            padding: 8px 16px;
            border-radius: 16px;
            text-align: center;
            /* Efek Badge Nama Gembung */
            box-shadow: 0 4px 0px #c5a000, 0 6px 10px rgba(0,0,0,0.15);
            border: 3px solid #0c2310;
            white-space: nowrap;
            z-index: 5;
        }

        /* --- KARTU MATERI SEBELAH KANAN KARTUN --- */
        .info-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #ffffff;
            padding: 30px;
            border-radius: 28px;
            border: 4px solid #1b5e20;
            box-shadow: inset 0 -5px 0px rgba(0,0,0,0.05), 0 8px 0px rgba(0,0,0,0.08);
            height: 380px;
        }

        .activity-card { text-align: left; }
        .activity-title { 
            font-family: 'Fredoka', sans-serif;
            font-size: 24px; 
            color: #2e7d32; 
            margin-bottom: 12px;
            line-height: 1.3;
            font-weight: 700;
        }
        .activity-time { 
            font-family: 'Fredoka', sans-serif;
            font-size: 13px; 
            color: #ffffff; 
            font-weight: 700; 
            display: inline-block;
            background: #ef6c00;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 0px #b55200;
            border: 2px solid #0c2310;
        }
        .activity-detail { 
            font-size: 15px; 
            line-height: 1.6;
            color: #455a64;
            margin: 0;
            font-weight: 600;
        }

        /* --- DETAIL TIMER DAN KONTROL MUSIK --- */
        .timer-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 12px;
            border-top: 4px dashed #ffd700;
        }
        .timer-display {
            font-size: 60px;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Fredoka', monospace;
            background: #e53935;
            padding: 4px 22px;
            border-radius: 20px;
            border: 4px solid #b71c1c;
            /* Efek Box Timer Balon Gembung */
            box-shadow: 0 6px 0px #7f100f, 0 10px 15px rgba(0,0,0,0.15);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }
        .music-control {
            background: #e1f5fe;
            border: 2px solid #0288d1;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #0288d1;
            box-shadow: 0 3px 0px #01579b;
        }

        /* --- TOMBOL JELLY 3D BUTTONS (MEMBAL SAAT DIKLIK) --- */
        .controls {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }
        .controls button {
            flex: 1;
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
            border: 3px solid #0c2310;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
        }
        
        /* Tombol Mulai */
        .btn-start { 
            background: linear-gradient(to bottom, #4caf50, #2e7d32); 
            color: white; 
            box-shadow: 0 5px 0px #1b5e20, 0 8px 10px rgba(0,0,0,0.15); 
        }
        .btn-start:hover { background: linear-gradient(to bottom, #66bb6a, #1b5e20); transform: translateY(1px); box-shadow: 0 4px 0px #1b5e20, 0 6px 8px rgba(0,0,0,0.15); }
        .btn-start:active { transform: translateY(5px); box-shadow: 0 0px 0px #1b5e20; }

        /* Tombol Pause */
        .btn-pause { 
            background: linear-gradient(to bottom, #ffb300, #ff8f00); 
            color: white; 
            box-shadow: 0 5px 0px #ff6f00, 0 8px 10px rgba(0,0,0,0.15); 
        }
        .btn-pause:hover { background: linear-gradient(to bottom, #ffca28, #ff6f00); transform: translateY(1px); box-shadow: 0 4px 0px #ff6f00, 0 6px 8px rgba(0,0,0,0.15); }
        .btn-pause:active { transform: translateY(5px); box-shadow: 0 0px 0px #ff6f00; }

        /* Tombol Lanjut */
        .btn-next { 
            background: linear-gradient(to bottom, #29b6f6, #0288d1); 
            color: white; 
            box-shadow: 0 5px 0px #01579b, 0 8px 10px rgba(0,0,0,0.15); 
        }
        .btn-next:hover { background: linear-gradient(to bottom, #4fc3f7, #01579b); transform: translateY(1px); box-shadow: 0 4px 0px #01579b, 0 6px 8px rgba(0,0,0,0.15); }
        .btn-next:active { transform: translateY(5px); box-shadow: 0 0px 0px #01579b; }
        
        .controls button:disabled { 
            background: #cfd8dc !important; 
            color: #90a4ae !important;
            border-color: #b0bec5 !important;
            box-shadow: 0 2px 0px #90a4ae !important;
            cursor: not-allowed; 
            transform: none !important;
        }

        .status-footer { display: flex; justify-content: center; margin-top: 15px; }
        .progress-badge {
            font-family: 'Fredoka', sans-serif;
            font-size: 12px; color: #fff; font-weight: 700;
            background: #1b5e20; padding: 6px 20px; border-radius: 30px;
            box-shadow: 0 3px 0px #ffd700;
        }

        /* --- ANIMASI KEYFRAMES INTERAKTIF --- */
        @keyframes containerPop {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes floatCartoon {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
        }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="https://docs.google.com/uc?export=download&id=15uOKGTUiNSqvo9ZD79oA1J3S7gWP99Te" type="audio/mpeg">
</audio>

<div class="container">
    <header>
        <h1>📌 PANDUAN AKTIVITAS MATAMUDA</h1>
        <h2>MIN 3 BONDOWOSO - HARI SENIN (HARI KE-1)</h2>
    </header>

    <div class="desktop-grid">
        <div class="speakers-column" id="speakers-container"></div>

        <div class="info-column">
            <div class="activity-card">
                <span id="act-time" class="activity-time">Waktu: --:--</span>
                <div id="act-title" class="activity-title">Memuat...</div>
                <p id="act-detail" class="activity-detail">Materi...</p>
            </div>

            <div>
                <div class="timer-section">
                    <div class="timer-display" id="timer">00:00</div>
                    <div class="music-control">🎵 Musik: <span id="music-status">Mati</span></div>
                </div>

                <div class="controls">
                    <button class="btn-start" id="btn-start" onclick="startTimer()">MULAI</button>
                    <button class="btn-pause" id="btn-pause" onclick="pauseTimer()" disabled>PAUSE</button>
                    <button class="btn-next" id="btn-next" onclick="nextActivity()">LANJUT KLIK</button>
                </div>
            </div>
        </div>
    </div>

    <div class="status-footer">
        <div class="progress-badge" id="progress">Aktivitas 1 dari 6</div>
    </div>
</div>

<script>
    // DATA BACKUP UTUH DAN TETAP SAMA 100%
    const idPhotos = {
        abdurrahman: "18OK2aJd-rJqoMr9TjOgZzhv5lkysJ55w",
        rofiq: "1-UnhtkKqrjxvWh7muXhG-AFJ5DqV7TjT",
        sitiLailatul: "1Lxr3PuzOkG5RghYU6X3s6l1YGNoSdh3A",
        kusumaWardani: "1CroqKQYrHsDzZOBiTI4iFdFEA5l7_EmK",
        sulaimanWahyu: "15Nk4hQwZQZ9mQOwRWcmWryqkiKMcWk9P",
        baratut: "1bz5tmvLoVopX37NGzpIPXIDLO58VrTEb",
        irmaNur: "18bqrkUSWN3kU9hrnttnEe4TcBMAZCKd0"
    };

    function getDirectLink(id) {
        return `https://lh3.googleusercontent.com/d/${id}`;
    }

    const jadwalSenin = [
        {
            waktu: "06.30 - 07.15 WIB",
            judul: "Pembiasaan Pagi & Ritual Pembuka Wajib",
            detail: "Muroja'ah Surat Pendek dan Sholat Dhuha Berjamaah bersama murid.",
            petugas: [
                { nama: "Ustd. Abdurrahman", foto: getDirectLink(idPhotos.abdurrahman) },
                { nama: "Ustd. Rofiq", foto: getDirectLink(idPhotos.rofiq) }
            ],
            durasi: 2700
        },
        {
            waktu: "07.15 - 08.00 WIB",
            judul: "Pembukaan & Ice Breaking",
            detail: "Menyanyikan Lagu Indonesia Raya & Mars Madrasah, Sambutan Kepala Madrasah, dilanjutkan permainan Edukatif Lempar Bola Nama.",
            petugas: [
                { nama: "Ustdz. Siti Lailatul F.", foto: getDirectLink(idPhotos.sitiLailatul) },
                { nama: "Ustdz. Kusuma Wardani", foto: getDirectLink(idPhotos.kusumaWardani) }
            ],
            durasi: 2700 
        },
        {
            waktu: "08.00 - 08.30 WIB",
            judul: "Matamuda Rising Stars Quiz & Reward",
            detail: "Sosialisasi Aplikasi dan Regulasi Bintang Harian Matamuda Rising Stars.",
            petugas: [
                { nama: "Ustd. Sulaiman Wahyu", foto: getDirectLink(idPhotos.sulaimanWahyu) }
            ],
            durasi: 1800 
        },
        {
            waktu: "08.30 - 09.00 WIB",
            judul: "Istirahat Ringan / Snack Time",
            detail: "Murid menikmati snack sehat bersama dibimbing adab makan yang benar.",
            petugas: [
                { nama: "Ustdz. Baratut", foto: getDirectLink(idPhotos.baratut) }
            ],
            durasi: 1800
        },
        {
            waktu: "09.00 - 09.45 WIB",
            judul: "Eksplorasi Lingkungan: Amazing Race",
            detail: "Berkeliling area madrasah (kelas, perpus, UKS dll) secara berkelompok.",
            petugas: [
                { nama: "Ustdz. Irma Nur Waqiah", foto: getDirectLink(idPhotos.irmaNur) }
            ],
            durasi: 2700
        },
        {
            waktu: "09.45 - 10.30 WIB",
            judul: "Ritual Penutup & Apresiasi",
            detail: "Refleksi harian 'Bintang Hari Ini', Tepuk Panca Cinta, Berdoa dan Pulang.",
            petugas: [
                { nama: "Ustd. Sulaiman Wahyu", foto: getDirectLink(idPhotos.sulaimanWahyu) }
            ],
            durasi: 2700
        }
    ];

    let currentIndex = 0;
    let timeLeft = 0;
    let timerInterval = null;
    let isRunning = false;
    const music = document.getElementById("bg-music");

    function playAlarmEffect() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(1, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 2); 
    }

    function loadActivity(index) {
        const container = document.getElementById("speakers-container");
        container.innerHTML = ""; 

        if (index >= jadwalSenin.length) {
            document.getElementById("act-title").innerText = "🎉 Acara Hari Senin Selesai!";
            document.getElementById("act-time").style.display = "none";
            document.getElementById("act-detail").innerText = "Rangkaian acara hari pertama selesai dilaksanakan.";
            document.getElementById("timer").innerText = "00:00";
            document.getElementById("btn-start").disabled = true;
            document.getElementById("btn-pause").disabled = true;
            document.getElementById("btn-next").disabled = true;
            music.pause();
            document.getElementById("music-status").innerText = "Mati";
            return;
        }

        const data = jadwalSenin[index];
        document.getElementById("act-title").innerText = data.judul;
        document.getElementById("act-time").style.display = "inline-block";
        document.getElementById("act-time").innerText = "⏰ " + data.waktu;
        document.getElementById("act-detail").innerText = data.detail;
        document.getElementById("progress").innerText = `Aktivitas ${index + 1} dari ${jadwalSenin.length}`;
        
        data.petugas.forEach((p, i) => {
            const wrapper = document.createElement("div");
            wrapper.className = "speaker-wrapper";
            wrapper.style.animationDelay = `${i * 0.4}s`; // Stagger delay gembung melayang bergantian
            
            const img = document.createElement("img");
            img.className = "speaker-photo";
            img.src = p.foto;
            img.alt = p.nama;
            
            const nameTag = document.createElement("div");
            nameTag.className = "speaker-name";
            nameTag.innerText = p.nama;
            
            wrapper.appendChild(img);
            wrapper.appendChild(nameTag);
            container.appendChild(wrapper);
        });

        timeLeft = data.durasi;
        updateTimerDisplay();
        
        document.getElementById("btn-start").disabled = false;
        document.getElementById("btn-pause").disabled = true;
    }

    function updateTimerDisplay() {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        document.getElementById("timer").innerText = `${minutes}:${seconds}`;
    }

    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        document.getElementById("btn-start").disabled = true;
        document.getElementById("btn-pause").disabled = false;

        music.play().catch(e => console.log("Izin audio aktif"));
        document.getElementById("music-status").innerText = "Looping 🎵";

        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateTimerDisplay();
            } else {
                clearInterval(timerInterval);
                isRunning = false;
                music.pause();
                document.getElementById("music-status").innerText = "Mati";
                playAlarmEffect();
                alert(`Sesi "${jadwalSenin[currentIndex].judul}" Selesai!`);
            }
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        music.pause();
        document.getElementById("music-status").innerText = "Dijeda ⏸️";
        document.getElementById("btn-start").disabled = false;
        document.getElementById("btn-pause").disabled = true;
    }

    function nextActivity() {
        clearInterval(timerInterval);
        isRunning = false;
        currentIndex++;
        loadActivity(currentIndex);
    }

    loadActivity(currentIndex);
</script>

</body>
</html>
