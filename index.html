<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panduan & Timer MATAMUDA - Senin (Desktop Premium)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: url('https://lh3.googleusercontent.com/d/1DWgcohqNfViclL0SIQIIo2QmTyBhKyEX') no-repeat center center fixed;
            background-size: cover;
            color: #2c3e50;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- CONTAINER UTAMA: PAPAN MENU GAME 4D --- */
        .container {
            width: 92%;
            max-width: 1200px;
            background: linear-gradient(135deg, #fffdf0 0%, #fff9d6 100%); 
            padding: 40px;
            border-radius: 45px;
            border: 8px solid #1b5e20;
            box-shadow: 
                0 18px 0px #0a330e, 
                0 30px 50px rgba(0, 0, 0, 0.35);
            position: relative;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { 
            font-family: 'Fredoka', sans-serif;
            color: #1b5e20; 
            margin: 0 0 6px 0; 
            font-size: 38px;
            font-weight: 700;
            text-shadow: 3px 3px 0px #ffd700, 6px 6px 0px #0a330e;
        }
        h2 { 
            font-family: 'Fredoka', sans-serif;
            font-size: 14px; 
            color: #ff6f00; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 1px 1px 0px #fff;
        }

        .desktop-grid {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            min-height: 410px;
        }

        /* --- BINGKAI FOTO PEMATERI KARTUN POP-ART --- */
        .speakers-column {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            height: 390px;
            position: relative;
            background: linear-gradient(135deg, #a4db9b 0%, #1b5e20 100%);
            border-radius: 32px;
            padding: 20px;
            border: 6px solid #0a330e;
            box-shadow: inset 0 10px 0px rgba(0,0,0,0.15), 0 8px 0px rgba(0,0,0,0.1);
        }

        .speaker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: floatCartoon 4s ease-in-out infinite;
        }

        .speaker-photo {
            width: 180px;
            height: 280px;
            object-fit: contain; 
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 82%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 82%, rgba(0,0,0,0) 100%);
            filter: drop-shadow(5px 5px 0px #0a330e);
        }

        .speaker-name {
            margin-top: -10px;
            font-family: 'Fredoka', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #1b5e20;
            background: #ffd700;
            padding: 8px 16px;
            border-radius: 18px;
            text-align: center;
            border: 3px solid #0a330e;
            box-shadow: 0 5px 0px #c5a000;
            white-space: nowrap;
            z-index: 5;
        }

        /* --- KARTU MATERI SEBELAH KANAN --- */
        .info-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #ffffff;
            padding: 30px;
            border-radius: 32px;
            border: 5px solid #0a330e;
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
            height: 390px;
        }

        .activity-card { text-align: left; }
        .activity-title { 
            font-family: 'Fredoka', sans-serif;
            font-size: 24px; 
            color: #1b5e20; 
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .activity-time { 
            font-family: 'Fredoka', sans-serif;
            font-size: 13px; 
            color: #ffffff; 
            font-weight: 700; 
            display: inline-block;
            background: #ff6f00;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 3px solid #0a330e;
            box-shadow: 0 4px 0px #b55200;
        }
        .activity-detail { 
            font-size: 15px; 
            line-height: 1.6;
            color: #37474f;
            font-weight: 600;
        }

        /* --- TIMER BALON EMAS & MERAH --- */
        .timer-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 4px dashed #ffd700;
        }
        .timer-display {
            font-size: 58px;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Fredoka', monospace;
            background: #d32f2f;
            padding: 2px 25px;
            border-radius: 22px;
            border: 4px solid #7f100f;
            box-shadow: 0 6px 0px #500505, 0 10px 15px rgba(0,0,0,0.15);
        }
        .music-control {
            background: #e1f5fe;
            border: 3px solid #0288d1;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #0288d1;
            box-shadow: 0 4px 0px #01579b;
        }

        /* --- TOMBOL JELLY 3D --- */
        .controls {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }

            flex: 1;
            padding: 14px 18px;
            font-size
