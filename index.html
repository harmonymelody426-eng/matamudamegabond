<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panduan & Timer MATAMUDA - Senin (Desktop Premium)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- HUBUNGAN KE LINGKUNGAN ANTAR MUKA MAJALAH BINTANG ANAK --- */
        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #1b3d22 0%, #081c0e 100%);
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Dekorasi Bintang Malam Berkedip */
        body::before {
            content: '★'; position: absolute; top: 12%; left: 8%; color: #ffd700; font-size: 26px; opacity: 0.8; animation: blink 2s infinite ease-in-out;
        }
        body::after {
            content: '✦'; position: absolute; bottom: 15%; right: 8%; color: #fff; font-size: 30px; opacity: 0.6; animation: blink 3s infinite ease-in-out 1s;
        }

        /* --- CONTAINER UTAMA: GAYA MAJALAH PREMIUM --- */
        .container {
            width: 95%;
            max-width: 1250px;
            background: #fffdf6; 
            padding: 35px;
            border-radius: 40px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4);
            border: 8px solid #ffd700;
            position: relative;
            overflow: hidden;
        }

        /* Pita Edisi Cetak Atas */
        .magazine-badge {
            position: absolute;
            top: 0;
            right: 50px;
            background: #ef6c00;
            color: #fff;
            padding: 8px 20px;
            font-family: 'Fredoka', sans-serif;
            font-size: 12px;
            font-weight: bold;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }
        h1 { 
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: #1b5e20; 
            margin: 0 0 4px 0; 
            font-size: 40px;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #ffd700;
        }
        h2 { 
            font-size: 14px; 
            color: #66bb6a; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .desktop-grid {
            display: flex;
            gap: 40px;
            align-items: stretch;
            justify-content: center;
        }

        /* --- STUNNING POSTER STYLE UNTUK FOTO PENYAJI --- */
        .speakers-column {
            flex: 1.3;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            background: linear-gradient(135deg, #a4db9b 0%, #2e7d32 100%);
            border-radius: 30px;
            padding: 30px 20px 20px 20px;
            position: relative;
            box-shadow: 0 15px 35px rgba(46, 125, 50, 0.3);
            border: 4px solid #1b5e20;
            min-height: 420px;
        }

        .speakers-column::before {
            content: '✨'; position: absolute; top: 15px; left: 20px; font-size: 24px;
        }

        .speaker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: float 4s ease-in-out infinite;
            width: 100%;
        }

        .speaker-photo {
            width: 100%;
            max-width: 200px;
            height: 300px;
            object-fit: contain; 
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
            filter: drop-shadow(5px 5px 0px #1b5e20);
        }

        .speaker-name {
            margin-top: -10px;
            font-family: 'Fredoka', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #1b5e20;
            background: #ffd700;
            padding: 10px 18px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 4px 4px 0px #1b5e20;
            border: 3px solid #1b5e20;
            white-space: nowrap;
            z-index: 2;
        }

        /* --- INFO AREA KANAN --- */
        .info-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #ffffff;
            padding: 35px;
            border-radius: 30px;
            border: 4px solid #1b5e20;
            box-shadow: 6px 6px 0px #1b5e20;
            position: relative;
        }

        .activity-card { text-align: left; animation: fadeIn 0.5s ease-out; }
        
        .activity-title { 
            font-family: 'Fredoka', sans-serif;
            font-size: 28px; 
            color: #2e7d32; 
            margin-bottom: 10px;
            line-height: 1.2;
            font-weight: 700;
        }
        .activity-time { 
            font-size: 14px; 
            color: #ef6c00; 
            font-weight: 700; 
            display: inline-block;
            background: #fff3e0;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 2px solid #ef6c00;
        }
        .activity-detail { 
            font-size: 16px; 
            line-height: 1.6;
            color: #455a64;
            margin: 0;
        }

        /* --- TIMER SECTION & BUTTON CONTROLS --- */
        .timer-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 4px dashed #ffd700;
        }
        .timer-display {
            font-size: 64px;
            font-weight: 700;
            color: #c62828;
            font-family: 'Fredoka', sans-serif;
            background: #ffebee;
            padding: 2px 25px;
            border-radius: 20px;
            border: 3px solid #c62828;
            box-shadow: 4px 4px 0px #c62828;
        }
        .music-control {
            background: #e1f5fe;
            border: 2px solid #1b5e20;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #0288d1;
            box-shadow: 2px 2px 0px #1b5e20;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .controls button {
            flex: 1;
            padding: 15px 20px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
            border: 3px solid #1b5e20;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-start { background-color: #2e7d32; color: white; box-shadow: 3px 3px 0px #1b5e20; }
        .btn-start:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 5px 5px 0px #1b5e20; }
        
        .btn-pause { background-color: #ffa000; color: white; box-shadow: 3px 3px 0px #1b5e20; }
        .btn-pause:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 5px 5px 0px #1b5e20; }
        
        .btn-next { background-color: #0288d1; color: white; box-shadow: 3px 3px 0px #1b5e20; }
        .btn-next:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 5px 5px 0px #1b5e20; }
        
        .controls button:disabled { 
            background-color: #cfd8dc !important; 
            color: #90a4ae !important;
            border-color: #90a4ae !important;
            box-shadow: none !important;
            cursor: not-allowed; 
            transform: none !important;
        }

        .status-footer { display: flex; justify-content: center; margin-top: 20px; }
        .progress-badge {
            font-family: 'Fredoka', sans-serif;
            font-size: 12px; color: #fff; font-weight: 700;
            background: #1b5e20; padding: 6px 16px; border-radius: 30px;
            box-shadow: 3px 3px 0px #ffd700;
        }

        /* --- ANIMASI KEYFRAMES GERAK --- */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes blink {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
